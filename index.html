<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contratos Basados en Acuerdos Marco — UCM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--rojo:#b71234;--rojo-dark:#8b0d27;--rojo-lite:#f5e6ea;--rojo-pale:#fef7f8;--gris:#3d3d3d;--gris-m:#6b7280;--borde:#e5e7eb;--blanco:#ffffff;--radio:10px;--fn:'DM Sans',system-ui,sans-serif;--fd:'DM Serif Display',Georgia,serif;--tr:.2s cubic-bezier(.4,0,.2,1);--sh:0 8px 32px rgba(0,0,0,.1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:var(--fn);background:#f0f2f5;color:var(--gris);min-height:100vh;padding:20px;line-height:1.5}
.container{max-width:1380px;margin:0 auto;background:var(--blanco);border-radius:14px;box-shadow:var(--sh);overflow:hidden}
.header{background:linear-gradient(135deg,var(--rojo) 0%,var(--rojo-dark) 100%);color:var(--blanco);padding:18px 32px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.header-icon{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.header-text h1{font-size:18px;font-weight:600;line-height:1.25}
.header-text h1 span{display:block;font-size:12px;font-weight:400;opacity:.75;margin-top:2px;letter-spacing:.01em}
.year-bar{padding:10px 32px;background:#1a1a2e;display:flex;align-items:center;gap:8px}
.year-bar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.5);margin-right:4px}
.year-tab{padding:6px 22px;border:2px solid rgba(255,255,255,.25);border-radius:8px;background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;font-family:var(--fn);cursor:pointer;transition:all var(--tr)}
.year-tab:hover{border-color:rgba(255,255,255,.55);color:#fff}
.year-tab.active{background:var(--rojo);border-color:var(--rojo);color:#fff}
.controls-bar{padding:12px 32px;background:var(--blanco);border-bottom:2px solid var(--borde);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-group>label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gris-m)}
.trim-tabs{display:flex;gap:4px}
.trim-tab{padding:7px 16px;border:2px solid var(--borde);border-radius:8px;background:var(--blanco);color:var(--gris);font-size:13px;font-weight:600;font-family:var(--fn);cursor:pointer;transition:all var(--tr);white-space:nowrap;line-height:1}
.trim-tab:hover:not(:disabled){border-color:var(--rojo);color:var(--rojo)}
.trim-tab.active{background:var(--rojo);border-color:var(--rojo);color:var(--blanco)}
.trim-tab:disabled{opacity:.35;cursor:not-allowed}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:420px}
.search-wrap input{width:100%;border:2px solid var(--borde);border-radius:8px;padding:8px 32px 8px 36px;font-size:13px;font-family:var(--fn);color:var(--gris);transition:all var(--tr)}
.search-wrap input:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px rgba(183,18,52,.1)}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gris-m);font-size:14px;pointer-events:none}
.s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gris-m);cursor:pointer;font-size:16px;padding:2px 5px;display:none;line-height:1}
.s-clear.on{display:block}
.export-group{display:flex;gap:7px;margin-left:auto}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;transition:all var(--tr);font-family:var(--fn);color:var(--blanco);white-space:nowrap}
.export-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.2)}
.export-btn.xl{background:#1D6F42}.export-btn.csv{background:#217346}
.export-btn svg{width:14px;height:14px;flex-shrink:0}
.main{padding:28px 32px 56px}
.prev-notice{display:flex;align-items:center;gap:14px;background:#f0f4ff;border:1px solid #c7d2fe;border-radius:var(--radio);padding:14px 20px;margin-bottom:28px;flex-wrap:wrap}
.prev-notice .pn-icon{font-size:20px;flex-shrink:0}
.prev-notice .pn-body{flex:1;min-width:180px}
.prev-notice .pn-body strong{font-size:13px;color:#3730a3;display:block;margin-bottom:2px}
.prev-notice .pn-body p{font-size:12px;color:var(--gris-m);line-height:1.4}
.prev-notice .pn-link{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#3730a3;color:#fff;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;transition:all var(--tr);flex-shrink:0}
.prev-notice .pn-link:hover{background:#4338ca;transform:translateY(-1px)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--blanco);border:1px solid var(--borde);border-top:3px solid var(--rojo);border-radius:var(--radio);padding:16px 16px 14px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow var(--tr),transform var(--tr)}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gris-m);margin-bottom:7px}
.kpi-val{font-family:var(--fd);color:var(--rojo);line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:var(--gris-m);line-height:1.4}
.tipo-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tipo-pill{display:inline-flex;align-items:center;gap:7px;background:var(--rojo-pale);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--tr);font-family:var(--fn);border:none;line-height:1}
.tipo-pill:hover{background:var(--rojo-lite)}
.tipo-pill.active{background:var(--rojo);color:#fff}
.tipo-pill .pn{font-family:var(--fd);font-size:15px;color:var(--rojo);line-height:1}
.tipo-pill.active .pn{color:#fff}
.sec-hdr{margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--rojo-lite);display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.sec-hdr h2{font-family:var(--fd);font-size:20px;color:var(--rojo-dark);font-weight:400}
.sec-meta{font-size:12px;color:var(--gris-m);font-style:italic}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radio);border:1px solid var(--borde);box-shadow:0 1px 4px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:linear-gradient(135deg,var(--rojo) 0%,var(--rojo-dark) 100%);color:var(--blanco);position:sticky;top:0;z-index:2}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;cursor:pointer;user-select:none;transition:background var(--tr)}
thead th:hover{background:rgba(255,255,255,.1)}
.si::after{content:'⇅';margin-left:4px;opacity:.45;font-size:10px}
.sa .si::after{content:'▲';opacity:1}.sd .si::after{content:'▼';opacity:1}
tbody tr{border-bottom:1px solid var(--borde);transition:background var(--tr)}
tbody tr:hover{background:var(--rojo-pale)}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:nth-child(even):hover{background:var(--rojo-pale)}
td{padding:8px 12px;vertical-align:top}
.tc-exp{font-size:11px;color:var(--gris-m);white-space:nowrap;font-family:'Courier New',monospace}
.tc-obj{max-width:360px;line-height:1.4}
.tc-uni{max-width:180px;font-size:11px;color:var(--gris-m);line-height:1.3}
.tc-adj{max-width:130px;font-size:12px;color:var(--gris-m);word-break:break-all}
.tc-am{font-size:11px;color:var(--gris-m);white-space:nowrap;font-family:'Courier New',monospace}
.badge-tipo{display:inline-block;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-S{background:#dbeafe;color:#1e40af}.badge-V{background:#dcfce7;color:#166534}.badge-O{background:#fef3c7;color:#92400e}
.badge-imp{display:inline-block;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
mark{background:#fef08a;color:inherit;border-radius:2px;padding:0 1px}
.pager{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap}
.pager-info{font-size:13px;color:var(--gris-m)}
.page-btns{display:flex;gap:4px}
.pb{width:34px;height:34px;border:1px solid var(--borde);border-radius:7px;background:var(--blanco);color:var(--gris);font-size:13px;font-family:var(--fn);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center}
.pb:hover{border-color:var(--rojo);color:var(--rojo)}.pb.act{background:var(--rojo);color:var(--blanco);border-color:var(--rojo);font-weight:700}.pb:disabled{opacity:.4;cursor:not-allowed}
.pp-sel{border:1px solid var(--borde);border-radius:7px;padding:6px 10px;font-size:13px;font-family:var(--fn);color:var(--gris);background:var(--blanco);cursor:pointer}
.footer{padding:16px 32px;background:#f0f2f5;border-top:1px solid var(--borde);text-align:center;font-size:13px;color:var(--gris-m)}
.footer a{color:var(--rojo-dark);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
:focus-visible{outline:3px solid var(--rojo);outline-offset:2px;border-radius:3px}
@media(max-width:900px){.kpi-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){body{padding:8px}.header,.controls-bar,.main{padding-left:16px;padding-right:16px}.kpi-grid{grid-template-columns:1fr 1fr;gap:10px}.kpi-val{font-size:18px!important}table{font-size:12px}td,thead th{padding:7px 8px}.search-wrap{max-width:100%;min-width:0;order:10;width:100%}.year-bar{padding:8px 16px}}
@media(max-width:400px){.kpi-grid{grid-template-columns:1fr}}
</style>
</head>

</div>

<main class="main" id="main-area"></main>

<footer class="footer">

      btn.title=TRIM_AVAILABLE_2026[t]?'':'Próximamente disponible';
    } else {btn.disabled=false;btn.title='';}
    btn.classList.toggle('active',t===ST.trim);
    btn.setAttribute('aria-pressed',t===ST.trim?'true':'false');
  });
}

function render(){
  const raw=getCurrentData();
  const he=hasExtra();
  const q=ST.q.toLowerCase().trim();
  const trimLabel=getTrimLabel();
  const nTotal=raw.length;
  const impTotal=raw.reduce((s,r)=>s+parseImp(r[3]),0);
  const nSumin=raw.filter(r=>r[2]&&r[2].toLowerCase()==='suministro').length;
  const nServ=raw.filter(r=>r[2]&&r[2].toLowerCase()==='servicio').length;
  const nOtros=nTotal-nSumin-nServ;
  let h='';

  if(ST.year==='2025'){
    h+=`<div class="prev-notice" role="note">
      <span class="pn-icon">📂</span>
      <div class="pn-body">
        <strong>Contratos de ejercicios anteriores a 2025</strong>
        <p>Los contratos basados en acuerdos marco de años anteriores están publicados en la Plataforma de Contratación del Estado.</p>
      </div>
      <a class="pn-link" href="${esc(PLAT_URL)}" target="_blank" rel="noopener">
        <i class="fa fa-external-link" aria-hidden="true"></i>Ver en la Plataforma
      </a>
    </div>`;
  } else if(nTotal===0){
    const msg2025 = ST.year==='2025'
      ? `<div class="prev-notice" role="note" style="background:#fefce8;border-color:#fde68a;">
          <span class="pn-icon">📄</span>
          <div class="pn-body">
            <strong style="color:#92400e;">Datos del ejercicio 2025</strong>
            <p>Los contratos de 2025 están disponibles en el archivo HTML del ejercicio anterior. Para consultarlos, abra el fichero <em>Basados_AM_2025.html</em> o acceda a los datos desde el Portal de Transparencia UCM.</p>
          </div>
          <a class="pn-link" style="background:#b45309;" href="${esc(PLAT_URL)}" target="_blank" rel="noopener">
            <i class="fa fa-external-link" aria-hidden="true"></i>Portal Transparencia
          </a>
        </div>`
      : `<div class="prev-notice" role="note" style="background:#f0fdf4;border-color:#bbf7d0;">
          <span class="pn-icon">📋</span>
          <div class="pn-body">
            <strong style="color:#166534;">Datos en preparación</strong>
            <p>Los contratos de este trimestre se publicarán próximamente una vez completado el período.</p>
          </div>
        </div>`;
    h+=msg2025;
    mainEl.innerHTML=h;return;
  }

  const impSize=impTotal>=1000000?'17px':impTotal>=100000?'21px':'24px';
  h+=`<section aria-label="Indicadores"><div class="kpi-grid">
    <article class="kpi" tabindex="0"><div class="kpi-label">Contratos &middot; ${esc(trimLabel)}</div><div class="kpi-val" style="font-size:28px">${nTotal.toLocaleString('es-ES')}</div><div class="kpi-sub">Basados en acuerdos marco</div></article>
    <article class="kpi" tabindex="0"><div class="kpi-label">Importe total adjudicado</div><div class="kpi-val" style="font-size:${impSize}">${fmtEur(impTotal)}</div><div class="kpi-sub">Suma de todos los importes</div></article>
    <article class="kpi" tabindex="0"><div class="kpi-label">Suministros</div><div class="kpi-val" style="font-size:28px">${nSumin.toLocaleString('es-ES')}</div><div class="kpi-sub">${nTotal?Math.round(nSumin/nTotal*100):0}% del total</div></article>
    <article class="kpi" tabindex="0"><div class="kpi-label">Servicios</div><div class="kpi-val" style="font-size:28px">${nServ.toLocaleString('es-ES')}</div><div class="kpi-sub">${nTotal?Math.round(nServ/nTotal*100):0}% del total${nOtros>0?` &middot; ${nOtros} otro${nOtros>1?'s':''}`:''}</div></article>
  </div></section>`;

  const tiposUnicos=[...new Set(raw.map(r=>r[2]).filter(Boolean))].sort();
  h+=`<div class="tipo-pills" role="group" aria-label="Filtrar por tipo">
    <button class="tipo-pill${ST.ftipo==='todos'?' active':''}" data-t="todos"><span class="pn">${nTotal.toLocaleString('es-ES')}</span>&nbsp;Todos</button>`;
  tiposUnicos.forEach(t=>{
    const cnt=raw.filter(r=>r[2]===t).length;
    h+=`<button class="tipo-pill${ST.ftipo===t?' active':''}" data-t="${esc(t)}"><span class="pn">${cnt.toLocaleString('es-ES')}</span>&nbsp;${esc(t)}</button>`;
  });
  h+=`</div>`;

  let data=raw.slice();
  if(q)data=data.filter(r=>(r[0]&&r[0].toLowerCase().includes(q))||(r[1]&&r[1].toLowerCase().includes(q))||(r[4]&&r[4].toLowerCase().includes(q))||(r[5]&&r[5].toLowerCase().includes(q))||(r[6]&&r[6].toLowerCase().includes(q)));
  if(ST.ftipo!=='todos')data=data.filter(r=>r[2]===ST.ftipo);

  const col=ST.scol,dir=ST.sdir==='asc'?1:-1;
  data.sort((a,b)=>{if(col===3)return(parseImp(a[3])-parseImp(b[3]))*dir;const av=a[col]||'',bv=b[col]||'';return(av<bv?-1:av>bv?1:0)*dir;});

  ST.fd=data;
  const tot=data.length;
  const pgs=Math.max(1,Math.ceil(tot/ST.pp));
  if(ST.pg>pgs)ST.pg=pgs;
  const st0=(ST.pg-1)*ST.pp;
  const sl=data.slice(st0,st0+ST.pp);
  const sc=i=>ST.scol===i?(ST.sdir==='asc'?'sa':'sd'):'';

  h+=`<section aria-labelledby="rel-h">
    <div class="sec-hdr"><h2 id="rel-h">Relación de contratos &middot; ${esc(trimLabel)}</h2>
    <span class="sec-meta">${tot===raw.length?tot.toLocaleString('es-ES')+' contratos':tot.toLocaleString('es-ES')+' de '+raw.length.toLocaleString('es-ES')+' (filtrados)'}</span></div>
    <div class="tw" role="region" aria-label="Tabla de contratos" tabindex="0"><table>
    <thead><tr>
      <th data-c="0" class="${sc(0)}" tabindex="0" scope="col">Código expediente<span class="si"></span></th>
      <th data-c="1" class="${sc(1)}" tabindex="0" scope="col">Objeto del contrato<span class="si"></span></th>
      <th data-c="2" class="${sc(2)}" tabindex="0" scope="col">Tipo<span class="si"></span></th>
      <th data-c="3" class="${sc(3)}" tabindex="0" scope="col" style="text-align:right">Imp. Adju. Total<span class="si"></span></th>
      ${he?`<th data-c="4" class="${sc(4)}" tabindex="0" scope="col">Unidad tramitadora<span class="si"></span></th>`:''}
      <th data-c="5" class="${sc(5)}" tabindex="0" scope="col">Adjudicatario<span class="si"></span></th>
      ${he?`<th data-c="6" class="${sc(6)}" tabindex="0" scope="col">Acuerdo Marco<span class="si"></span></th>`:''}
    </tr></thead><tbody>`;

  if(tot===0){
    h+=`<tr><td colspan="${he?7:5}" style="text-align:center;padding:40px 16px;color:var(--gris-m)">No se encontraron contratos para «<strong>${esc(q)}</strong>».</td></tr>`;
  } else {
    sl.forEach(r=>{
      h+=`<tr>
        <td class="tc-exp">${hi(r[0],q)}</td>
        <td class="tc-obj">${hi(r[1],q)}</td>
        <td>${tipoBadge(r[2])}</td>
        <td style="text-align:right">${r[3]?`<span class="badge-imp">${esc(r[3])}</span>`:''}</td>
        ${he?`<td class="tc-uni">${hi(r[4],q)}</td>`:''}
        <td class="tc-adj">${hi(r[5],q)}</td>
        ${he?`<td class="tc-am">${esc(r[6])}</td>`:''}
      </tr>`;
    });
  }
  h+=`</tbody></table></div>`;

  if(pgs>1){
    const maxB=7;let s0=Math.max(1,ST.pg-Math.floor(maxB/2));let e0=Math.min(pgs,s0+maxB-1);if(e0-s0<maxB-1)s0=Math.max(1,e0-maxB+1);
    h+=`<div class="pager">
      <div class="pager-info">Mostrando ${(st0+1).toLocaleString('es-ES')}–${Math.min(st0+ST.pp,tot).toLocaleString('es-ES')} de ${tot.toLocaleString('es-ES')} contratos</div>
      <div style="display:flex;align-items:center;gap:8px"><label for="pp-sel" style="font-size:12px;color:var(--gris-m)">Por página:</label>
        <select class="pp-sel" id="pp-sel">${[50,100,200,500].map(n=>`<option value="${n}"${ST.pp===n?' selected':''}>${n}</option>`).join('')}</select>
      </div>
      <div class="page-btns" role="navigation" aria-label="Paginación">
        <button class="pb" data-p="prev" ${ST.pg===1?'disabled':''}>‹</button>`;
    if(s0>1)h+=`<button class="pb" data-p="1">1</button><span style="padding:0 4px;color:var(--gris-m)">…</span>`;
    for(let p=s0;p<=e0;p++)h+=`<button class="pb${p===ST.pg?' act':''}" data-p="${p}">${p}</button>`;
    if(e0<pgs)h+=`<span style="padding:0 4px;color:var(--gris-m)">…</span><button class="pb" data-p="${pgs}">${pgs}</button>`;
    h+=`<button class="pb" data-p="next" ${ST.pg===pgs?'disabled':''}>›</button></div></div>`;
  }
  h+=`</section>`;
  mainEl.innerHTML=h;
  bind();
}

function bind(){
  document.querySelectorAll('thead th[data-c]').forEach(th=>{
    const go=()=>{const c=+th.dataset.c;ST.scol===c?ST.sdir=(ST.sdir==='asc'?'desc':'asc'):(ST.scol=c,ST.sdir='asc');ST.pg=1;render();};
    th.onclick=go;th.onkeydown=e=>(e.key==='Enter'||e.key===' ')&&(e.preventDefault(),go());
  });
  document.querySelectorAll('.tipo-pill').forEach(b=>{b.onclick=()=>{ST.ftipo=b.dataset.t;ST.pg=1;render();};});
  document.querySelectorAll('.pb').forEach(b=>{
    b.onclick=()=>{const p=b.dataset.p;if(p==='prev')ST.pg=Math.max(1,ST.pg-1);else if(p==='next')ST.pg=Math.min(Math.ceil(ST.fd.length/ST.pp),ST.pg+1);else ST.pg=+p;render();mainEl.scrollIntoView({behavior:'smooth',block:'start'});};
  });
  const pp=document.getElementById('pp-sel');if(pp)pp.onchange=e=>{ST.pp=+e.target.value;ST.pg=1;render();};
}

function buildRows(){
  const he=hasExtra();const data=(ST.q||ST.ftipo!=='todos')?ST.fd:getCurrentData();
  const trimLabel=getTrimLabel();
  const hdr=he?['Código de expediente','Objeto del contrato','Tipo de Contrato','Imp. Adju. Total','Unidad Tramitadora','Adjudicatario','Acuerdo Marco']:['Código de expediente','Objeto del contrato','Tipo de Contrato','Imp. Adju. Total','Adjudicatario'];
  return [[`Universidad Complutense de Madrid — Contratos Basados en Acuerdos Marco · ${trimLabel}`],['Fuente: Portal de Transparencia UCM · Dirección de Contratación Administrativa'],[],hdr,...data.map(r=>he?[r[0],r[1],r[2],r[3]||'',r[4]||'',r[5]||'',r[6]||'']:[r[0],r[1],r[2],r[3]||'',r[5]||''])];
}

document.getElementById('btn-xl').onclick=()=>{
  const rows=buildRows();const he=hasExtra();const ws=XLSX.utils.aoa_to_sheet(rows);
  const ncols=rows[3].length-1;ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:ncols}},{s:{r:1,c:0},e:{r:1,c:ncols}}];
  ws['!cols']=he?[{wch:26},{wch:60},{wch:13},{wch:16},{wch:28},{wch:18},{wch:14}]:[{wch:26},{wch:60},{wch:13},{wch:16},{wch:18}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,getTrimLabel().substring(0,31));
  XLSX.writeFile(wb,`UCM_Basados_AM_${ST.year}_${ST.trim}.xlsx`);
};
document.getElementById('btn-csv').onclick=()=>{
  const rows=buildRows();const csv='sep=;\r\n'+rows.map(r=>r.map(c=>{const s=String(c==null?'':c);return s.includes(';')||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s;}).join(';')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`UCM_Basados_AM_${ST.year}_${ST.trim}.csv`;a.click();
};

document.querySelectorAll('.year-tab').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.year-tab').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false');});
    btn.classList.add('active');btn.setAttribute('aria-pressed','true');
    ST.year=btn.dataset.y;
    ST.trim=ST.year==='2026'?'1T':'1T';
    ST.q='';ST.pg=1;ST.ftipo='todos';ST.scol=0;ST.sdir='asc';
    document.getElementById('buscador').value='';
    document.getElementById('btn-clr').classList.remove('on');
    document.getElementById('header-subtitle').textContent=`Portal de Transparencia · Universidad Complutense de Madrid · ${ST.year}`;
    updateTrimTabs();render();
  };
});
document.querySelectorAll('.trim-tab').forEach(btn=>{
  btn.onclick=()=>{
    if(btn.disabled)return;
    document.querySelectorAll('.trim-tab').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false');});
    btn.classList.add('active');btn.setAttribute('aria-pressed','true');
    ST.trim=btn.dataset.t;ST.q='';ST.pg=1;ST.ftipo='todos';ST.scol=0;ST.sdir='asc';
    document.getElementById('buscador').value='';document.getElementById('btn-clr').classList.remove('on');
    render();
  };
});
let dbt;
document.getElementById('buscador').oninput=e=>{clearTimeout(dbt);dbt=setTimeout(()=>{ST.q=e.target.value;ST.pg=1;document.getElementById('btn-clr').classList.toggle('on',!!e.target.value);render();},200);};
document.getElementById('btn-clr').onclick=()=>{document.getElementById('buscador').value='';ST.q='';ST.pg=1;document.getElementById('btn-clr').classList.remove('on');render();document.getElementById('buscador').focus();};

updateTrimTabs();render();
</script>
</body>
</html>
